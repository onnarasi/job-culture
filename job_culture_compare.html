<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>각국 취업문화 비교</title>
<style>
  :root{
    --navy:#1f3864; --blue:#2e5fa3; --gold:#f4b740; --green:#2e9e6b;
    --cream:#fbf7ef; --ink:#1a2238; --line:#e2e8f2; --card:#ffffff;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:"Pretendard","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    background:
      radial-gradient(circle at 10% 6%, #eaf1fb 0, transparent 40%),
      radial-gradient(circle at 92% 96%, #fdf2dd 0, transparent 44%),
      var(--cream);
    color:var(--ink); min-height:100vh;
    display:flex; justify-content:center; padding:18px 14px 46px;
  }
  .wrap{width:100%; max-width:540px;}

  .head{
    background:linear-gradient(135deg,var(--navy),var(--blue));
    color:#fff; border-radius:22px; padding:22px; position:relative; overflow:hidden;
    box-shadow:0 12px 30px rgba(31,56,100,.28);
  }
  .head:after{content:"🌏"; position:absolute; right:-6px; top:-12px; font-size:86px; opacity:.15; transform:rotate(-10deg);}
  .badge{display:inline-block; background:var(--gold); color:#5b3d00; font-weight:800;
    font-size:13px; padding:5px 12px; border-radius:999px;}
  .head h1{font-size:25px; margin-top:12px; line-height:1.25; font-weight:800;}
  .head p{font-size:14px; opacity:.9; margin-top:8px;}

  /* country tabs */
  .tabs{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:16px;}
  .tabs button{
    border:none; cursor:pointer; font-size:13.5px; font-weight:800;
    padding:9px 4px; border-radius:13px; background:#fff; color:var(--navy);
    border:2px solid var(--line); transition:.16s; white-space:nowrap;
  }
  .tabs button .flag{font-size:20px; display:block; margin-bottom:2px;}
  .tabs button.on{background:linear-gradient(135deg,var(--navy),var(--blue)); color:#fff; border-color:transparent;
    box-shadow:0 8px 18px rgba(31,56,100,.26); transform:translateY(-1px);}
  .tabs button:active{transform:scale(.96);}

  .card{
    background:var(--card); border-radius:22px; margin-top:16px; padding:6px;
    box-shadow:0 8px 24px rgba(31,56,100,.10); border:1px solid var(--line);
    animation:pop .35s ease;
  }
  @keyframes pop{from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;}}

  .cname{display:flex; align-items:center; gap:12px; padding:16px 16px 8px;}
  .cname .bigflag{font-size:38px;}
  .cname h2{font-size:22px; color:var(--navy); font-weight:800;}
  .cname span{font-size:13px; color:#8b96ab; font-weight:600;}

  /* visual: attire + resume illustration */
  .viz{display:flex; gap:14px; padding:8px 16px 14px; align-items:stretch;}
  .vizbox{flex:1; background:linear-gradient(180deg,#f7faff,#eef3fb); border:1px solid var(--line);
    border-radius:14px; padding:12px 8px 10px; text-align:center; display:flex; flex-direction:column; align-items:center;}
  .vizbox .t{font-size:11px; font-weight:800; color:var(--blue); letter-spacing:.4px; margin-bottom:8px;}
  .vizbox .cap{font-size:11px; color:#7c879b; margin-top:8px; line-height:1.4; font-weight:600;}

  /* CSS person (interview attire) */
  .person{width:74px; height:92px; position:relative;}
  .person .head{position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:30px; height:30px; border-radius:50%; background:#e9c3a0;}
  .person .hair{position:absolute; top:-2px; left:50%; transform:translateX(-50%);
    width:32px; height:18px; border-radius:16px 16px 0 0; background:#2a2a2e;}
  .person .torso{position:absolute; bottom:0; left:50%; transform:translateX(-50%);
    width:64px; height:58px; border-radius:14px 14px 8px 8px;}
  .person .shirtV{position:absolute; bottom:0; left:50%; transform:translateX(-50%);
    width:22px; height:46px; clip-path:polygon(50% 0,100% 14%,72% 100%,28% 100%,0 14%);}
  .person .tie{position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
    width:7px; height:30px; clip-path:polygon(50% 0,100% 22%,60% 100%,40% 100%,0 22%);}

  /* Korea real photo (interview attire) */
  .kr-photo{height:230px; width:auto; border-radius:10px; object-fit:contain;
    box-shadow:0 6px 16px rgba(31,56,100,.20);}
  /* single vizbox (이력서 칸 제거 후 면접 복장만) */
  .vizbox.single{padding:16px 8px 14px;}
  .vizbox.single .person{transform:scale(1.9); margin:34px 0 30px;}

  /* CSS resume mini */
  .resume{width:62px; height:80px; background:#fff; border:1px solid #d6deea; border-radius:6px;
    position:relative; box-shadow:0 3px 8px rgba(31,56,100,.10); padding:7px 7px 0;}
  .resume .ph{width:18px; height:22px; border-radius:3px; background:#cfd9e8; position:absolute; top:7px; right:7px;
    display:flex; align-items:center; justify-content:center; font-size:11px; color:#8b97ab;}
  .resume .ph.no{background:#fbe3e1; color:#c4564b;}
  .resume .ln{height:4px; border-radius:3px; background:#e6ecf5; margin-bottom:5px;}
  .resume .ln.w1{width:26px;} .resume .ln.w2{width:34px;} .resume .ln.full{width:100%;}
  .resume .lns{position:absolute; left:7px; right:7px; bottom:8px;}

  .rows{padding:6px 14px 16px;}
  .item{display:flex; gap:12px; padding:13px 0; border-bottom:1px solid #f0f3f8;}
  .item:last-child{border-bottom:none;}
  .item .ic{font-size:22px; flex:0 0 30px; text-align:center;}
  .item .body .lab{font-size:12px; font-weight:800; color:var(--blue); letter-spacing:.4px; text-transform:uppercase;}
  .item .body .val{font-size:15.5px; color:#37425c; line-height:1.5; margin-top:2px;}
  /* 영어 해석: 마우스오버(데스크톱) 또는 탭(모바일)으로 표시 */
  .item{cursor:pointer; transition:background .15s;}
  .item:hover{background:#f7faff;}
  .en-tip{font-size:12px; opacity:.55; user-select:none;}
  .en-text{display:none; margin-top:7px; padding:9px 11px; background:#eef4fc; border-left:3px solid var(--blue);
    border-radius:8px; font-size:13.5px; line-height:1.5; color:#2a4a73; font-style:italic;}
  .item:hover .en-text, .item.show-en .en-text{display:block;}
  @media (hover:hover){ .en-tip{opacity:.4;} }

  .kr-tip{
    margin:0 14px 14px; background:#fff8e8; border:1px solid #f3dca0; border-left:5px solid var(--gold);
    border-radius:12px; padding:13px 14px; font-size:14.5px; color:#7a5a14; line-height:1.55;
  }
  .kr-tip b{color:#b9820e;}

  /* compare table toggle */
  .cmpBtn{
    width:100%; margin-top:16px; border:none; cursor:pointer; border-radius:16px; padding:15px;
    font-size:16px; font-weight:800; background:#eef1f7; color:var(--navy); transition:.15s;
  }
  .cmpBtn:active{transform:scale(.98);}
  .cmpWrap{display:none; margin-top:14px; background:#fff; border-radius:18px; border:1px solid var(--line);
    overflow:hidden; box-shadow:0 8px 24px rgba(31,56,100,.08);}
  .cmpWrap.show{display:block; animation:pop .3s ease; overflow-x:auto;}
  table{width:100%; min-width:430px; border-collapse:collapse; font-size:12px;}
  th,td{padding:9px 3px; text-align:center; border-bottom:1px solid #eef1f7;}
  th{background:var(--navy); color:#fff; font-size:10.5px; font-weight:800;}
  td:first-child,th:first-child{text-align:left; font-weight:700; position:sticky; left:0;}
  th:first-child{background:var(--navy);}
  td:first-child{color:var(--navy); background:#f6f9fd; white-space:nowrap; font-size:11px;}
  tr:last-child td{border-bottom:none;}

  .ask{margin:18px 4px 0; font-size:14px; color:#6b7790; line-height:1.6; text-align:center;}
  .ask b{color:var(--navy);}
  .foot{text-align:center; font-size:12px; color:#9aa5ba; margin-top:18px; line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <span class="badge">제29과 · 도입</span>
    <h1>나라마다 다른 취업·면접 문화</h1>
    <p>여덟 나라를 눌러 비교해 보세요. 🇰🇷 한국과 어떻게 다를까요?</p>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="panel"></div>

  <button class="cmpBtn" id="cmpBtn">📊 한눈에 비교하기</button>
  <div class="cmpWrap" id="cmpWrap"></div>

  <p class="ask">💬 생각해 봅시다: <b>아시아 나라들의 공통점</b>은 무엇이고,<br><b>미국은 왜 다를까요?</b></p>

  <div class="foot">사회통합프로그램(KIIP) 한국사회 이해(기본) · 제29과 취업하기</div>
</div>

<script>
const C = {
  kr:{ flag:"🇰🇷", name:"한국", sub:"Korea",

      ["📄","이력서 스타일","증명사진 부착이 일반적. 학력·경력을 시간 순으로 정리. 자기소개서를 함께 제출.","A photo is usually attached. List education/career in chronological order, and submit a cover letter too."],
      ["🙇","면접 예절","예의·겸손 중시. 존댓말 사용, 면접관과 눈을 적절히 맞추기. 시간 엄수.","Politeness and humility matter. Use honorifics, make appropriate eye contact, and be on time."],
      ["⭐","핵심 포인트","\"일할 의지와 열정\"을 적극적으로 표현하는 것이 매우 중요.","It is very important to actively show your 'willingness and passion to work.'"],
    ],
    tip:"한국 기업은 <b>예의·성실함·입사 의지</b>를 특히 중요하게 봅니다. 자기소개서에서 회사에 대한 관심과 열정을 보여주세요." },

  cn:{ flag:"🇨🇳", name:"중국", sub:"China",

    rows:[
      ["👔","면접 복장","비즈니스 정장. 한국과 비슷하게 단정한 차림을 선호.","Business suit. Like Korea, a neat appearance is preferred."],
      ["📄","이력서 스타일","증명사진 부착이 일반적. 학력·자격증 등 스펙을 강조하는 경향.","A photo is common. Tends to emphasize credentials such as education and certificates."],
      ["🤝","면접 예절","자신감 있는 자기표현을 중시. 관계(关系)와 성실함도 함께 평가.","Confident self-expression is valued. Relationships (guanxi) and sincerity are also assessed."],
      ["⭐","핵심 포인트","능력과 성과를 분명하게 드러내는 것이 도움이 됨.","Clearly showing your skills and achievements helps."],
    ],
    tip:"한국과 비슷하게 <b>사진·격식</b>을 갖추지만, 중국은 <b>자신감 있는 표현</b>이 조금 더 자연스럽게 받아들여집니다." },

  vn:{ flag:"🇻🇳", name:"베트남", sub:"Vietnam",
    viz:{ suit:"#23314d", shirt:"#f4f7fb", tie:"#c79a2e", photo:true, cap:"보수적 정장 · 사진 O" },
    rows:[
      ["👔","면접 복장","어두운색 정장 등 보수적·격식 있는 차림. 단정함과 겸손함 강조.","Conservative, formal attire such as a dark suit. Neatness and modesty are emphasized."],
      ["📄","이력서 스타일","증명사진 부착이 표준. 이름·연락처 등 개인정보를 앞쪽에 배치. 경력을 최신순으로.","A photo is standard. Put personal info (name, contact) at the top; list experience newest-first."],
      ["⏰","면접 예절","시간 엄수와 예의를 매우 중시. 직접적인 자기 자랑보다 겸손한 태도 선호.","Punctuality and politeness matter a lot. A modest attitude is preferred over direct boasting."],

    ],
    tip:"베트남도 <b>사진·격식·시간 엄수</b>를 중시해 한국과 매우 비슷합니다. 다만 지나친 자기 자랑보다 <b>겸손한 표현</b>이 좋습니다." },

  th:{ flag:"🇹🇭", name:"태국", sub:"Thailand",
    viz:{ suit:"#2e3b52", shirt:"#ffffff", tie:"#3f7d9c", photo:true, cap:"단정한 정장 · 사진 O" },
    rows:[
      ["👔","면접 복장","단정한 비즈니스 차림. 보수적이고 깔끔한 인상을 선호.","Neat business attire. A conservative, tidy impression is preferred."],
      ["📄","이력서 스타일","증명사진 부착이 일반적. 학력·경력과 함께 기본 개인정보 기재.","A photo is common. List basic personal info along with education and experience."],

    ],

      ["📄","이력서 스타일","증명사진 부착이 일반적. 학력·경력을 정리하고 면접관 패널 앞에서 대면 면접이 흔함.","A photo is common. Panel (in-person) interviews in front of several interviewers are typical."],
      ["🍵","면접 예절","위계·연장자 존중을 매우 중시. 간접적이고 겸손한 소통, 차 대접을 정중히 받는 예절이 중요.","Respect for hierarchy and elders matters greatly. Indirect, modest communication and politely accepting offered tea are important."],
      ["⭐","핵심 포인트","결정이 늦어도 침착하게 기다리기. 끈기와 협동심을 보여주면 좋은 인상.","Stay calm even if decisions take time. Showing patience and cooperativeness makes a good impression."],
    ],
    tip:"몽골은 <b>위계 존중·겸손한 태도</b>를 중시해 한국과 비슷합니다. 면접에서 차나 음식을 권하면 정중히 받는 것이 예의입니다." },

  kz:{ flag:"🇺🇿", name:"우즈베키스탄", sub:"Uzbekistan",

      ["🤝","면접 예절","연장자·상사 존중을 매우 중시(존칭 'Siz' 사용). 시간 엄수, 관계·신뢰 형성을 중요시.","Respect for elders and superiors matters greatly (the honorific 'Siz' is used). Punctuality and building trust are valued."],
      ["⭐","핵심 포인트","러시아어·우즈베크어 등 다국어 능력이 큰 강점. 정중하고 격식 있는 태도가 핵심.","Multilingual ability (Russian, Uzbek, etc.) is a big strength. A polite, formal manner is key."],

    rows:[
      ["👔","면접 복장","비즈니스 캐주얼~정장. 직무·회사 분위기에 따라 유연하지만 단정함은 기본.","Business casual to formal. It varies by role/company culture, but neatness is a must."],
      ["📄","이력서 스타일","사진·나이·결혼 여부를 넣지 않음(차별 방지). 능력·성과를 수치로 1장에 간결하게.","No photo, age, or marital status (to prevent discrimination). Show skills/results with numbers, concisely on one page."],
      ["💬","면접 예절","자신감 있는 자기표현과 적극적인 소통 중시. 성과를 구체적 숫자로 어필.","Confident self-expression and proactive communication are valued. Highlight achievements with concrete numbers."],
      ["⭐","핵심 포인트","겸손보다 '내가 어떤 성과를 냈는지' 분명히 말하는 것이 유리.","Clearly stating 'what results I achieved' works better than being modest."],
    ],
    tip:"미국은 한국과 크게 달라요! <b>사진·개인정보를 넣지 않고</b>, 겸손보다 <b>능력과 성과를 적극적으로</b> 표현하는 것이 좋습니다." },
};
const ORDER = ["kr","cn","vn","th","mn","kz","jp","us"];
let cur = "kr";

const $=id=>document.getElementById(id);

function renderTabs(){
  $("tabs").innerHTML = ORDER.map(k=>
    `<button data-k="${k}" class="${k===cur?'on':''}">
       <span class="flag">${C[k].flag}</span>${C[k].name}</button>`).join("");
  document.querySelectorAll("#tabs button").forEach(b=>{
    b.onclick=()=>{ cur=b.dataset.k; renderTabs(); renderPanel(); };
  });
}

function vizHTML(c){
  const v=c.viz;
  const photoMap = { Korea: KR_IMG, China: CN_IMG, Vietnam: VN_IMG, Thailand: TH_IMG, Mongolia: MN_IMG, Uzbekistan: UZ_IMG, Japan: JP_IMG, USA: US_IMG };
  const realPhoto = photoMap[c.sub];
  const person = realPhoto
    ? `<img class="kr-photo" src="${realPhoto}" alt="${c.name} 면접 복장">`
    : `<div class="person">
      <div class="torso" style="background:${v.suit}"></div>
      <div class="shirtV" style="background:${v.shirt}"></div>
      <div class="tie" style="background:${v.tie}"></div>
      <div class="head"></div><div class="hair"></div>
    </div>`;
  return `<div class="viz">
    <div class="vizbox single"><div class="t">면접 복장</div>${person}<div class="cap">${v.cap.split(' · ')[0]}</div></div>
  </div>`;
}

function renderPanel(){
  const c=C[cur];
  $("panel").innerHTML =
    `<div class="card">
      <div class="cname"><span class="bigflag">${c.flag}</span>
        <div><h2>${c.name}</h2><span>${c.sub}</span></div></div>
      ${vizHTML(c)}
      <div class="rows">
        ${c.rows.map(r=>`<div class="item"><div class="ic">${r[0]}</div>
          <div class="body"><div class="lab">${r[1]}</div><div class="val">${r[2]}${r[3]?`<span class="en-tip" title="${r[3].replace(/"/g,'&quot;')}"> 🌐</span><div class="en-text">${r[3]}</div>`:''}</div></div></div>`).join("")}
      </div>
      <div class="kr-tip">💡 ${c.tip}</div>
    </div>`;
  // 모바일 터치: 항목을 탭하면 영어 해석 토글
  $("panel").querySelectorAll(".item").forEach(it=>{
    it.addEventListener("click",()=>it.classList.toggle("show-en"));
  });
}

function renderCompare(){
  const head = `<tr><th>구분</th>${ORDER.map(k=>`<th>${C[k].flag}<br>${C[k].name}</th>`).join("")}</tr>`;
  const labels=["사진 부착","격식 복장","시간 엄수·예의","자기표현 강조"];
  //            kr   cn   vn   th   mn   kz   jp   us
  const matrix=[
    ["⭕","⭕","⭕","⭕","⭕","⭕","⭕","✕"],   // 사진
    ["⭕","⭕","⭕","⭕","⭕","⭕","⭕","○"],   // 격식
    ["◎","○","◎","◎","◎","◎","◎","○"],    // 시간/예의
    ["◎","◎","○","○","○","○","◎","◎"],    // 자기표현
  ];
  const body=labels.map((l,i)=>`<tr><td>${l}</td>${matrix[i].map(v=>`<td>${v}</td>`).join("")}</tr>`).join("");
  $("cmpWrap").innerHTML = `<table>${head}${body}</table>
    <div style="padding:10px 12px; font-size:11.5px; color:#8b96ab; text-align:left;">
    ⭕ 일반적 · ◎ 매우 중시 · ○ 보통 · ✕ 하지 않음 — 아시아권은 사진·격식이 비슷하지만, 🇺🇸 미국은 사진을 넣지 않고 능력을 강조합니다.</div>`;
}

$("cmpBtn").onclick=()=>{
  const w=$("cmpWrap");
  w.classList.toggle("show");
  $("cmpBtn").textContent = w.classList.contains("show") ? "📊 비교 닫기" : "📊 한눈에 비교하기";
};

renderTabs(); renderPanel(); renderCompare();
</script>
</body>
